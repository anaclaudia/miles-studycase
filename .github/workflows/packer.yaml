name: Bake LXC base template

on:
  push:
    branches: [main]
    paths:
      - 'packer/**'
  workflow_dispatch:    # allows manual trigger from the GitHub UI

jobs:
  packer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Packer
        run: |
          wget -O- https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y packer

      - name: Packer init
        working-directory: packer
        run: packer init lxc-base.pkr.hcl

      - name: Packer validate
        working-directory: packer
        env:
          PKR_VAR_proxmox_url:      ${{ secrets.PROXMOX_URL }}
          PKR_VAR_proxmox_username: ${{ secrets.PROXMOX_USER }}
          PKR_VAR_proxmox_password: ${{ secrets.PROXMOX_PASSWORD }}
          PKR_VAR_proxmox_node:     ${{ vars.PROXMOX_NODE }}
        run: packer validate lxc-base.pkr.hcl

      - name: Packer build
        working-directory: packer
        env:
          PKR_VAR_proxmox_url:      ${{ secrets.PROXMOX_URL }}
          PKR_VAR_proxmox_username: ${{ secrets.PROXMOX_USER }}
          PKR_VAR_proxmox_password: ${{ secrets.PROXMOX_PASSWORD }}
          PKR_VAR_proxmox_node:     ${{ vars.PROXMOX_NODE }}
          PKR_VAR_proxmox_storage:  ${{ vars.PROXMOX_STORAGE }}
        run: packer build lxc-base.pkr.hcl