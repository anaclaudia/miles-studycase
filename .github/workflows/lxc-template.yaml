name: Bake LXC base template

on:
  push:
    branches: [main]
    paths:
      - 'scripts/create_lxc_template.py'
  workflow_dispatch:
    inputs:
      force:
        description: 'Rebuild template even if it already exists'
        required: false
        default: 'false'

jobs:
  build-template:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.PROXMOX_JUMP_SSH_KEY }}" > ~/.ssh/jump_key
          chmod 600 ~/.ssh/jump_key
          ssh-keyscan -p 2245 ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts

      - name: Copy script to Proxmox host
        run: |
          scp -i ~/.ssh/jump_key \
              -P 2245 \
              -o StrictHostKeyChecking=yes \
              scripts/create_lxc_template.py \
              admin@${{ secrets.PROXMOX_HOST }}:/tmp/create_lxc_template.py

      - name: Run template builder on Proxmox host
        run: |
          ARGS=""
          [ "${{ github.event.inputs.force }}" = "true" ] && ARGS="--force"
          ssh -i ~/.ssh/jump_key \
              -p 2245 \
              -o StrictHostKeyChecking=yes \
              admin@${{ secrets.PROXMOX_HOST }} \
              "PROXMOX_URL=${{ secrets.PROXMOX_URL }} \
               PROXMOX_NODE=${{ vars.PROXMOX_NODE }} \
               PROXMOX_USER=${{ secrets.PROXMOX_USER }} \
               PROXMOX_TOKEN_ID=${{ secrets.PROXMOX_TOKEN_ID }} \
               PROXMOX_API_TOKEN=${{ secrets.PROXMOX_API_TOKEN }} \
               PROXMOX_STORAGE=${{ vars.PROXMOX_STORAGE }} \
               PROXMOX_BRIDGE=${{ vars.PROXMOX_BRIDGE }} \
               PROXMOX_TEMPLATE=miles-challenge-base \
               TEMPLATE_VMID=9000 \
               LXC_DEPLOY_PUBLIC_KEY='${{ secrets.LXC_DEPLOY_PUBLIC_KEY }}' \
               python3 /tmp/create_lxc_template.py $ARGS"