name: Build, Publish & Deploy (immutable LXC)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Build and publish package to PyPI ──────────────────────────────────
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Set package version
        id: version
        working-directory: web_app
        run: |
          VERSION=$(date -u +"%Y.%m.%d.%H%M")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Syntax check
        working-directory: web_app
        run: python3 -m py_compile src/miles_challenge/app.py && echo "syntax ok"

      - name: Build wheel + sdist
        working-directory: web_app
        run: python -m build

      - name: Check built artifacts
        working-directory: web_app
        run: ls -lh dist/

      - name: Publish to PyPI
        working-directory: web_app
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # ── 2. Provision new LXC via Proxmox API ──────────────────────────────────
  provision:
    runs-on: ubuntu-latest
    needs: publish
    outputs:
      new_vmid: ${{ steps.compute.outputs.new_vmid }}
      new_ip:   ${{ steps.compute.outputs.new_ip }}
      old_vmid: ${{ steps.get_old.outputs.old_vmid }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute VMID and IP
        id: compute
        run: |
          NEW_VMID=$(( ${{ github.run_number }} + 200 ))
          NEW_IP="10.10.10.$(( ${{ github.run_number }} % 200 + 50 ))"
          echo "new_vmid=$NEW_VMID" >> $GITHUB_OUTPUT
          echo "new_ip=$NEW_IP"     >> $GITHUB_OUTPUT
          echo "New VMID: $NEW_VMID, New IP: $NEW_IP"

      - name: Set up SSH jump host
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.PROXMOX_JUMP_SSH_KEY }}" > ~/.ssh/jump_key
          chmod 600 ~/.ssh/jump_key
          ssh-keyscan -p 2245 ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts

      - name: Get current (old) LXC VMID
        id: get_old
        run: |
          RESPONSE=$(curl -s --insecure \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_USER }}!${{ secrets.PROXMOX_TOKEN_ID }}=${{ secrets.PROXMOX_API_TOKEN }}" \
            "${{ secrets.PROXMOX_URL }}/api2/json/nodes/${{ vars.PROXMOX_NODE }}/lxc")
          echo "Proxmox API response: $RESPONSE"
          OLD=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin).get('data', [])
              hits = [c['vmid'] for c in data if c.get('name','').startswith('miles-challenge-') and not c.get('template')]
              print(min(hits) if hits else '')
          except Exception as e:
              print('', file=sys.stderr)
              sys.exit(0)
          " || echo "")
          echo "old_vmid=$OLD" >> $GITHUB_OUTPUT
          echo "Old VMID: ${OLD:-none}"

      - name: Create new LXC container
        env:
          PROXMOX_URL:            ${{ secrets.PROXMOX_URL }}
          PROXMOX_NODE:           ${{ vars.PROXMOX_NODE }}
          PROXMOX_USER:           ${{ secrets.PROXMOX_USER }}
          PROXMOX_TOKEN_ID:       ${{ secrets.PROXMOX_TOKEN_ID }}
          PROXMOX_API_TOKEN:      ${{ secrets.PROXMOX_API_TOKEN }}
          PROXMOX_TEMPLATE:       miles-challenge-base
          PROXMOX_STORAGE:        ${{ vars.PROXMOX_STORAGE }}
          LXC_GATEWAY:            ${{ vars.LXC_GATEWAY }}
          LXC_DEPLOY_PUBLIC_KEY:  ${{ secrets.LXC_DEPLOY_PUBLIC_KEY }}
        run: |
          python3 scripts/proxmox_lxc.py create \
            --vmid ${{ steps.compute.outputs.new_vmid }} \
            --ip   ${{ steps.compute.outputs.new_ip }}

      - name: Debug SSH key in LXC via Proxmox API
        run: |
          RESPONSE=$(curl -s --insecure \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_USER }}!${{ secrets.PROXMOX_TOKEN_ID }}=${{ secrets.PROXMOX_API_TOKEN }}" \
            -X POST \
            "${{ secrets.PROXMOX_URL }}/api2/json/nodes/${{ vars.PROXMOX_NODE }}/lxc/${{ steps.compute.outputs.new_vmid }}/exec" \
            -H "Content-Type: application/json" \
            -d '{"command":["cat","/root/.ssh/authorized_keys"]}')
          echo "authorized_keys content response: $RESPONSE"

          echo "=== LXC_DEPLOY_SSH_KEY fingerprint ==="
          echo "${{ secrets.LXC_DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keygen -lf /tmp/deploy_key
          rm /tmp/deploy_key

      - name: Wait for SSH to become available on new LXC
        run: |
          echo "${{ secrets.LXC_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.PROXMOX_JUMP_SSH_KEY }}" > ~/.ssh/jump_key
          chmod 600 ~/.ssh/jump_key
          ssh-keyscan -p 2245 ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          for i in $(seq 1 24); do
            ssh -o StrictHostKeyChecking=no \
                -o ConnectTimeout=5 \
                -o BatchMode=yes \
                -i ~/.ssh/deploy_key \
                -o ProxyCommand="ssh -i ~/.ssh/jump_key -p 2245 -W %h:%p -o StrictHostKeyChecking=no -o BatchMode=yes gh-jump@${{ secrets.PROXMOX_HOST }}" \
                root@${{ steps.compute.outputs.new_ip }} echo "ssh ok" && break
            echo "Attempt $i — retrying in 5s..."
            sleep 5
          done

  # ── 3. Configure new LXC with Ansible ─────────────────────────────────────
  configure:
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.postgresql ansible.posix

      - name: Set up SSH keys
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.PROXMOX_JUMP_SSH_KEY }}" > ~/.ssh/jump_key
          echo "${{ secrets.PROXMOX_ADMIN_SSH_KEY }}" > ~/.ssh/admin_key
          echo "${{ secrets.LXC_DEPLOY_SSH_KEY }}"   > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/jump_key ~/.ssh/admin_key ~/.ssh/deploy_key
          ssh-keyscan -p 2245 ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts

      - name: Write dynamic inventory for new LXC
        run: |
          NEW_IP="${{ needs.provision.outputs.new_ip }}"
          PROXMOX_HOST="${{ secrets.PROXMOX_HOST }}"
          cat > /tmp/inventory_new.yml << EOF
          all:
            hosts:
              lxc_new:
                ansible_host: ${NEW_IP}
                ansible_user: root
                ansible_ssh_private_key_file: ~/.ssh/deploy_key
                ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o ProxyCommand='ssh -i ~/.ssh/jump_key -p 2245 -W %h:%p -o StrictHostKeyChecking=no gh-jump@${PROXMOX_HOST}'"
          EOF

      - name: Run Ansible configure playbook
        env:
          DB_USER:               ${{ secrets.DB_USER }}
          DB_PASSWORD:           ${{ secrets.DB_PASSWORD }}
          LXC_DEPLOY_PUBLIC_KEY: ${{ secrets.LXC_DEPLOY_PUBLIC_KEY }}
        run: |
          ansible-playbook \
            -i /tmp/inventory_new.yml \
            ansible/playbooks/lxc-configure.yml \
            -u root \
            --private-key ~/.ssh/deploy_key \
            -e "db_user=$DB_USER" \
            -e "db_password=$DB_PASSWORD" \
            -e "deploy_public_key=$LXC_DEPLOY_PUBLIC_KEY" \
            -e "root_password=${{ secrets.ROOT_PASSWORD }}" \
            -e "@ansible/group_vars/all.yml"

      - name: Write Proxmox inventory
        run: |
          PROXMOX_HOST="${{ secrets.PROXMOX_HOST }}"
          cat > /tmp/inventory_proxmox.yml << EOF
          all:
            hosts:
              proxmox_host:
                ansible_host: ${PROXMOX_HOST}
                ansible_port: 2245
                ansible_user: root
                ansible_ssh_private_key_file: ~/.ssh/jump_key
          EOF

      - name: Debug Proxmox inventory
        run: |
          echo "=== inventory content ==="
          cat /tmp/inventory_proxmox.yml
          echo "=== admin key fingerprint ==="
          ssh-keygen -lf ~/.ssh/admin_key
          echo "=== test direct SSH ==="
          ssh -i ~/.ssh/admin_key \
              -p 2245 \
              -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              admin@${{ secrets.PROXMOX_HOST }} echo "ssh ok" || echo "SSH FAILED"

      - name: Run Ansible proxmox-nginx playbook
        run: |
          ansible-playbook \
            -i /tmp/inventory_proxmox.yml \
            ansible/playbooks/proxmox-nginx.yml \
            -e "@ansible/group_vars/all.yml" \
            -e "lxc_ip=${{ needs.provision.outputs.new_ip }}" \
            -e "lxc_port=5000" \
            -u admin \
            --private-key ~/.ssh/admin_key \
            --become \
            --become-method=sudo

  # ── 4. Smoke test the new LXC ─────────────────────────────────────────────
  smoke_test:
    runs-on: ubuntu-latest
    needs: [provision, configure]

    steps:
      - name: Set up SSH jump
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.PROXMOX_JUMP_SSH_KEY }}" > ~/.ssh/jump_key
          chmod 600 ~/.ssh/jump_key
          ssh-keyscan -p 2245 ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts

      - name: Hit /healthcheck on new LXC via jump host
        run: |
          echo "${{ secrets.LXC_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Check app status inside the LXC before testing
          echo "=== systemd service status ==="
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="ssh -i ~/.ssh/jump_key -p 2245 -W %h:%p -o StrictHostKeyChecking=no gh-jump@${{ secrets.PROXMOX_HOST }}" \
              root@${{ needs.provision.outputs.new_ip }} \
              "systemctl status miles-challenge --no-pager || true"

          echo "=== journal logs ==="
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="ssh -i ~/.ssh/jump_key -p 2245 -W %h:%p -o StrictHostKeyChecking=no gh-jump@${{ secrets.PROXMOX_HOST }}" \
              root@${{ needs.provision.outputs.new_ip }} \
              "journalctl -u miles-challenge -n 30 --no-pager || true"

          echo "=== listening ports ==="
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ProxyCommand="ssh -i ~/.ssh/jump_key -p 2245 -W %h:%p -o StrictHostKeyChecking=no gh-jump@${{ secrets.PROXMOX_HOST }}" \
              root@${{ needs.provision.outputs.new_ip }} \
              "ss -tlnp || true"

          # Open tunnel and test
          ssh -i ~/.ssh/jump_key \
              -p 2245 \
              -o StrictHostKeyChecking=yes \
              -L 18080:${{ needs.provision.outputs.new_ip }}:5000 \
              -N -f \
              gh-jump@${{ secrets.PROXMOX_HOST }}
          sleep 2
          RESPONSE=$(curl -sf http://localhost:18080/healthcheck)
          echo "Healthcheck response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || \
            (echo "Smoke test FAILED" && exit 1)
          echo "Smoke test passed"

  # ── 5. Swap Nginx upstream + destroy old LXC ──────────────────────────────
  swap_and_destroy:
    runs-on: ubuntu-latest
    needs: [provision, smoke_test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH keys
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.PROXMOX_JUMP_SSH_KEY }}" > ~/.ssh/jump_key
          chmod 600 ~/.ssh/jump_key
          ssh-keyscan -p 2245 ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts

      - name: Destroy old LXC
        if: needs.provision.outputs.old_vmid != ''
        env:
          PROXMOX_URL:       ${{ secrets.PROXMOX_URL }}
          PROXMOX_NODE:      ${{ vars.PROXMOX_NODE }}
          PROXMOX_USER:      ${{ secrets.PROXMOX_USER }}
          PROXMOX_TOKEN_ID:  ${{ secrets.PROXMOX_TOKEN_ID }}
          PROXMOX_API_TOKEN: ${{ secrets.PROXMOX_API_TOKEN }}
          LXC_DEPLOY_PUBLIC_KEY: ${{ secrets.LXC_DEPLOY_PUBLIC_KEY }}
        run: |
          python3 scripts/proxmox_lxc.py destroy \
            --vmid ${{ needs.provision.outputs.old_vmid }}