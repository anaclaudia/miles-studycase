name: Build, Publish & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build & push the package to GitHub Packages ──────────────────────────
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Set package version
        working-directory: web_app
        run: |
          VERSION=$(date -u +"%Y.%m.%d.%H%M")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Build wheel + sdist
        working-directory: web_app
        run: python -m build

      - name: Publish to GitHub Packages
        working-directory: web_app
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # ── 2. Deploy: SSH through Proxmox jump host → LXC ─────────────────────────
  deploy:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      # Write both SSH keys to the runner's agent so ProxyJump works
      - name: Set up SSH keys
        run: |
          set -x
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.PROXMOX_JUMP_SSH_KEY }}" > ~/.ssh/jump_key
          echo "${{ secrets.LXC_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/jump_key ~/.ssh/deploy_key
          ssh-keyscan -p 2245 ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts
          echo "Host proxmox-jump" >> ~/.ssh/config
          echo "  HostName ${{ secrets.PROXMOX_HOST }}" >> ~/.ssh/config
          echo "  User gh-jump" >> ~/.ssh/config
          echo "  Port 2245" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/jump_key" >> ~/.ssh/config
          echo "  StrictHostKeyChecking yes" >> ~/.ssh/config
          echo "Host lxc-target" >> ~/.ssh/config
          echo "  HostName ${{ secrets.LXC_IP }}" >> ~/.ssh/config
          echo "  User deploy" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/deploy_key" >> ~/.ssh/config
          echo "  ProxyJump proxmox-jump" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy to LXC via ProxyJump
        run: |
          ssh -T lxc-target << 'ENDSSH'
            /app/venv/bin/pip install \
              --upgrade miles-challenge \
            && sudo systemctl restart miles-challenge
          ENDSSH