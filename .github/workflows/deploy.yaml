name: Build, Publish & Deploy

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build & push the package to GitHub Packages ──────────────────────────
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Set package version
        run: |
          VERSION=$(date -u +"%Y.%m.%d.%H%M")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^version = .*/version = \"$VERSION\"/" ../web_app/pyproject.toml

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to GitHub Packages
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          TWINE_REPOSITORY_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/
        run: twine upload --skip-existing dist/*

  # ── 2. Deploy: SSH through Proxmox jump host → LXC ─────────────────────────
  deploy:
    needs: publish
    runs-on: ubuntu-latest

    steps:
      # Write both SSH keys to the runner's agent so ProxyJump works
      - name: Set up SSH keys
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Key used to authenticate against the Proxmox jump user
          echo "${{ secrets.PROXMOX_JUMP_SSH_KEY }}" > ~/.ssh/jump_key
          # Key used to authenticate against the deploy user inside the LXC
          echo "${{ secrets.LXC_DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/jump_key ~/.ssh/deploy_key

          # Trust the Proxmox host fingerprint (avoids interactive prompt)
          ssh-keyscan -p 22 ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts

          # SSH config: route LXC connections through the Proxmox jump host
          cat >> ~/.ssh/config <<EOF
          Host proxmox-jump
            HostName ${{ secrets.PROXMOX_HOST }}
            User gh-jump
            IdentityFile ~/.ssh/jump_key
            StrictHostKeyChecking yes

          Host lxc-target
            HostName ${{ secrets.LXC_IP }}
            User deploy
            IdentityFile ~/.ssh/deploy_key
            ProxyJump proxmox-jump
            StrictHostKeyChecking no
          EOF

      - name: Deploy to LXC via ProxyJump
        run: |
          ssh lxc-target << 'ENDSSH'
            /app/venv/bin/pip install \
              --index-url https://deploy:${{ secrets.GITHUB_TOKEN }}@nuget.pkg.github.com/${{ github.repository_owner }}/simple/ \
              --upgrade miles-challenge \
            && sudo systemctl restart miles-challenge
          ENDSSH