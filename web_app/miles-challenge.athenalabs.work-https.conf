upstream flask_app {
    server 10.10.10.15:5000;
}

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    server_name miles-challenge.athenalabs.work;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl;
    server_name miles-challenge.athenalabs.work;

    # --- TLS (managed by Certbot — paths are set automatically) ---
    ssl_certificate     /etc/letsencrypt/live/miles-challenge.athenalabs.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miles-challenge.athenalabs.work/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # --- Proxy to Gunicorn ---
    location / {
        proxy_pass         http://flask_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Healthcheck passthrough ---
    location /healthcheck {
        proxy_pass         http://flask_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;   # avoid noise in access logs
    }

    # --- Static files (if you add any later) ---
    location /static/ {
        alias /app/static/;
        expires 30d;
    }

    # --- Logging ---
    access_log /var/log/nginx/miles-challenge.access.log;
    error_log  /var/log/nginx/miles-challenge.error.log;
}