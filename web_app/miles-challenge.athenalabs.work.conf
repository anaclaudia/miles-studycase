upstream flask_app {
    # LXC Container IP address
    server 10.10.10.15:5000;
}

server {
    listen 80;
    server_name miles-challenge.athenalabs.work;

    # 1. Deny access to hidden files (like .git or .env)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # 2. Serve Static Files directly via Nginx (Faster than Flask)
    location /static/ {
        alias /var/www/challenge/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 3. Proxy everything else to Gunicorn
    location / {
        include proxy_params; # Standard Nginx proxy parameters
        proxy_pass http://flask_app;
        
        # Connection settings for Gunicorn
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Handle long-running Flask requests (e.g., heavy data processing)
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # Custom Error Page
    error_page 502 /502.html;
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }
}