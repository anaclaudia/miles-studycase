---
- name: Configure Proxmox jump user and NAT forwarding
  hosts: proxmox_host
  become: true

  tasks:
    # ── IP forwarding ────────────────────────────────────────────────────────
    - name: Enable IPv4 forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: true

    # ── iptables NAT rules ───────────────────────────────────────────────────
    - name: Install iptables-persistent
      ansible.builtin.apt:
        name: iptables-persistent
        state: present
        update_cache: true

    - name: Forward HTTP to LXC
      ansible.builtin.iptables:
        table: nat
        chain: PREROUTING
        in_interface: "{{ proxmox_pub_iface }}"
        protocol: tcp
        destination_port: "80"
        jump: DNAT
        to_destination: "{{ lxc_ip }}:80"
        state: present

    - name: Forward HTTPS to LXC
      ansible.builtin.iptables:
        table: nat
        chain: PREROUTING
        in_interface: "{{ proxmox_pub_iface }}"
        protocol: tcp
        destination_port: "443"
        jump: DNAT
        to_destination: "{{ lxc_ip }}:443"
        state: present

    - name: Allow forwarded HTTP traffic
      ansible.builtin.iptables:
        chain: FORWARD
        protocol: tcp
        destination: "{{ lxc_ip }}"
        destination_port: "80"
        jump: ACCEPT
        state: present

    - name: Allow forwarded HTTPS traffic
      ansible.builtin.iptables:
        chain: FORWARD
        protocol: tcp
        destination: "{{ lxc_ip }}"
        destination_port: "443"
        jump: ACCEPT
        state: present

    - name: Masquerade outbound traffic from LXC
      ansible.builtin.iptables:
        table: nat
        chain: POSTROUTING
        source: "{{ lxc_ip }}"
        out_interface: "{{ proxmox_pub_iface }}"
        jump: MASQUERADE
        state: present

    - name: Persist iptables rules
      ansible.builtin.command: netfilter-persistent save
      changed_when: true

    # ── gh-jump user ─────────────────────────────────────────────────────────
    - name: Create gh-jump system user
      ansible.builtin.user:
        name: "{{ jump_user }}"
        system: true
        create_home: true
        shell: /usr/sbin/nologin
        state: present

    - name: Create .ssh directory for jump user
      ansible.builtin.file:
        path: "/home/{{ jump_user }}/.ssh"
        state: directory
        owner: "{{ jump_user }}"
        group: "{{ jump_user }}"
        mode: "0700"

    - name: Add GitHub Actions public key to jump user
      ansible.builtin.lineinfile:
        path: "/home/{{ jump_user }}/.ssh/authorized_keys"
        line: "restrict,port-forwarding {{ jump_public_key }}"
        create: true
        owner: "{{ jump_user }}"
        group: "{{ jump_user }}"
        mode: "0600"