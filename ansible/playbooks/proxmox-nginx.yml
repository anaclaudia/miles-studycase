---
- name: Configure Nginx reverse proxy and TLS on Proxmox host
  hosts: proxmox_host
  become: true

  tasks:
    - name: Fail if lxc_ip is not defined
      ansible.builtin.fail:
        msg: "lxc_ip must be passed as an extra var: -e lxc_ip=10.10.10.X"
      when: lxc_ip is not defined

    - name: Debug lxc_ip value
      ansible.builtin.debug:
        msg: "Configuring upstream to {{ lxc_ip }}:{{ lxc_port | default('5000') }}"

    # ── Packages ──────────────────────────────────────────────────────────────
    - name: Install Nginx and Certbot
      ansible.builtin.apt:
        name:
          - nginx
          - certbot
          - python3-certbot-nginx
        state: present
        update_cache: true

    - name: Ensure Nginx is started and enabled
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true

    # ── HTTP-only vhost (needed by Certbot's HTTP-01 challenge) ───────────────
    - name: Deploy HTTP-only Nginx config (pre-certbot)
      ansible.builtin.template:
        src: templates/proxmox-nginx-http.j2
        dest: "/etc/nginx/sites-available/{{ app_domain }}"
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Enable site
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ app_domain }}"
        dest: "/etc/nginx/sites-enabled/{{ app_domain }}"
        state: link
      notify: Reload nginx

    - name: Remove default Nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Flush handlers to reload Nginx before running Certbot
      ansible.builtin.meta: flush_handlers

    # ── TLS certificate ───────────────────────────────────────────────────────
    - name: Obtain TLS certificate via Certbot
      ansible.builtin.command:
        cmd: >
          certbot --nginx
          -d {{ app_domain }}
          --non-interactive
          --agree-tos
          -m {{ certbot_email }}
        creates: "/etc/letsencrypt/live/{{ app_domain }}/fullchain.pem"

    # ── Full HTTPS vhost ──────────────────────────────────────────────────────
    - name: Deploy full HTTPS Nginx config
      ansible.builtin.template:
        src: templates/proxmox-nginx-https.j2
        dest: "/etc/nginx/sites-available/{{ app_domain }}"
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    # ── THIS IS THE SWAP ──────────────────────────────────────────────────────
    # Updates /etc/nginx/lxc-upstream.conf with the new LXC IP:port.
    # The Nginx upstream block includes this file, so reloading Nginx
    # immediately shifts all traffic to the new container.
    - name: Update lxc-upstream.conf → point traffic to new LXC
      ansible.builtin.copy:
        dest: /etc/nginx/lxc-upstream.conf
        content: "server {{ lxc_ip }}:{{ lxc_port | default('5000') }};\n"
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx   # ← triggers the handler below

    - name: Show lxc-upstream.conf content
      ansible.builtin.command:
        cmd: cat /etc/nginx/lxc-upstream.conf
      register: upstream_content
      changed_when: false

    - name: Debug upstream content
      ansible.builtin.debug:
        msg: "lxc-upstream.conf: {{ upstream_content.stdout }}"

    # ── Certbot auto-renewal ──────────────────────────────────────────────────
    - name: Ensure Certbot renewal timer is enabled
      ansible.builtin.service:
        name: certbot.timer
        state: started
        enabled: true

    - name: Deploy Nginx reload hook for Certbot renewal
      ansible.builtin.copy:
        dest: /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
        content: |
          #!/usr/bin/env bash
          systemctl reload nginx
        owner: root
        group: root
        mode: "0755"

  handlers:
    # ── THIS IS THE RELOAD ────────────────────────────────────────────────────
    # Triggered by the notify on the upstream update task above.
    # Reloads Nginx config without dropping connections — zero downtime swap.
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded   # ← reloaded not restarted — zero downtime