---
- name: Configure fresh LXC container — install app and wire up services
  hosts: lxc_new
  become: true
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    # ── Root password (for Proxmox console access) ────────────────────────────
    - name: Set root password
      ansible.builtin.user:
        name: root
        password: "{{ root_password | password_hash('sha512') }}"

    # ── System packages ───────────────────────────────────────────────────────
    - name: Install required packages
      ansible.builtin.apt:
        name:
          - python3
          - python3-venv
          - python3-pip
          - python3-psycopg2
          - nginx
          - certbot
          - python3-certbot-nginx
          - postgresql
          - postgresql-contrib
          - acl
        state: present
        update_cache: true

    # ── PostgreSQL ────────────────────────────────────────────────────────────
    - name: Ensure PostgreSQL is started and enabled
      ansible.builtin.service:
        name: postgresql
        state: started
        enabled: true

    - name: Create database user
      become_user: postgres
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        state: present

    - name: Create application database
      become_user: postgres
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        owner: "{{ db_user }}"
        state: present

    # ── App directory and virtualenv ──────────────────────────────────────────
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Create gunicorn log directory
      ansible.builtin.file:
        path: /var/log/gunicorn
        state: directory
        owner: www-data
        group: www-data
        mode: "0755"

    - name: Install latest miles-challenge from PyPI
      ansible.builtin.pip:
        name: miles-challenge
        virtualenv: "{{ app_dir }}/venv"
        virtualenv_command: python3 -m venv
        state: latest
        extra_args: "--no-cache-dir"

    # ── Write configs from package ────────────────────────────────────────────
    - name: Debug venv contents
      ansible.builtin.shell:
        cmd: "ls -la {{ app_dir }}/venv/bin/ && {{ app_dir }}/venv/bin/pip show miles-challenge"
      changed_when: false
      register: venv_debug
      ignore_errors: true

    - name: Show venv debug output
      ansible.builtin.debug:
        var: venv_debug.stdout_lines

    - name: Write gunicorn config from package
      ansible.builtin.shell:
        cmd: "{{ app_dir }}/venv/bin/miles-challenge-gunicorn-conf > {{ app_dir }}/gunicorn.conf.py"
      changed_when: true

    - name: Write systemd service file from package
      ansible.builtin.shell:
        cmd: "{{ app_dir }}/venv/bin/miles-challenge-service > /etc/systemd/system/{{ app_service }}.service"
      changed_when: true
      notify: Reload systemd

    # ── .env file ─────────────────────────────────────────────────────────────
    - name: Write .env file
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        owner: www-data
        group: www-data
        mode: "0600"

    # ── Permissions ───────────────────────────────────────────────────────────
    - name: Set ownership of app directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        recurse: true
        owner: www-data
        group: www-data

    # ── Deploy user ───────────────────────────────────────────────────────────
    - name: Create deploy user
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        system: true
        create_home: true
        shell: /bin/bash
        state: present

    - name: Create .ssh directory for deploy user
      ansible.builtin.file:
        path: "/home/{{ deploy_user }}/.ssh"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0700"

    - name: Add deploy SSH public key
      ansible.builtin.lineinfile:
        path: "/home/{{ deploy_user }}/.ssh/authorized_keys"
        line: "{{ deploy_public_key }}"
        create: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"

    - name: Allow deploy user to manage service via sudo
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ deploy_user }}-{{ app_service }}"
        content: |
          {{ deploy_user }} ALL=(root) NOPASSWD: /bin/systemctl daemon-reload
          {{ deploy_user }} ALL=(root) NOPASSWD: /bin/systemctl restart {{ app_service }}
          {{ deploy_user }} ALL=(root) NOPASSWD: /bin/tee /etc/systemd/system/{{ app_service }}.service
        owner: root
        group: root
        mode: "0440"
        validate: visudo -cf %s

    - name: Allow deploy user to write to venv
      ansible.builtin.file:
        path: "{{ app_dir }}/venv"
        state: directory
        recurse: true
        group: "{{ deploy_user }}"
        mode: "g+w"

    # ── Nginx ─────────────────────────────────────────────────────────────────
    - name: Deploy nginx HTTP config
      ansible.builtin.template:
        src: templates/proxmox-nginx-http.j2
        dest: "/etc/nginx/sites-available/{{ app_domain }}"
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Enable nginx site
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ app_domain }}"
        dest: "/etc/nginx/sites-enabled/{{ app_domain }}"
        state: link

    - name: Remove default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Flush handlers before starting app
      ansible.builtin.meta: flush_handlers

    # ── Start app ─────────────────────────────────────────────────────────────
    - name: Enable and start app service
      ansible.builtin.service:
        name: "{{ app_service }}"
        state: started
        enabled: true

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded