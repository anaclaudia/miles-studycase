all:
  children:
    proxmox:
      hosts:
        proxmox_host:
          ansible_host: "{{ lookup('env', 'PROXMOX_HOST') }}"
          ansible_user: admin
          ansible_port: 2245
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    lxc:
      hosts:
        lxc_container:
          ansible_host: "{{ lookup('env', 'LXC_IP') }}"
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          ansible_ssh_common_args: "-o ProxyJump=root@{{ lookup('env', 'PROXMOX_HOST') }}"